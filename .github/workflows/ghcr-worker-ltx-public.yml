name: ghcr-worker-ltx-public

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - name: Make worker-ltx-comfyui package public
        run: |
          curl -fsSL -X PATCH \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/worker-ltx-comfyui/visibility" \
            -d '{"visibility":"public"}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
