name: ghcr-worker-ltx-public

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - name: List container packages
        id: list
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages?package_type=container" \
            | tee /tmp/packages.json
          python3 - <<'PY'
          import json
          data = json.load(open("/tmp/packages.json"))
          names = [p.get("name") for p in data]
          print("packages:", names)
          PY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make worker-ltx-comfyui package public
        run: |
          for pkg in worker-ltx-comfyui generator-v2/worker-ltx-comfyui; do
            encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${pkg}', safe=''))")
            if curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${encoded}/visibility" \
              -d '{"visibility":"public"}'; then
              echo "public: ${pkg}"
              exit 0
            fi
          done
          echo "failed to set package public" >&2
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
