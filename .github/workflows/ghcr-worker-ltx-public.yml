name: ghcr-worker-ltx-public

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        id: public
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetNames = new Set([
              "worker-ltx-comfyui",
              `${repo}/worker-ltx-comfyui`,
            ]);

            async function listRepoPackages() {
              const query = `
                query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    packages(first: 50, packageType: CONTAINER) {
                      nodes { id name }
                    }
                  }
                }`;
              const data = await github.graphql(query, { owner, repo });
              return data.repository.packages.nodes;
            }

            async function listUserPackages() {
              const query = `
                query {
                  viewer {
                    packages(first: 50, packageType: CONTAINER) {
                      nodes { id name }
                    }
                  }
                }`;
              const data = await github.graphql(query);
              return data.viewer.packages.nodes;
            }

            async function makePublic(packageId, name) {
              const mutation = `
                mutation($packageId: ID!) {
                  updatePackage(input: { packageId: $packageId, visibility: PUBLIC }) {
                    package { id name visibility }
                  }
                }`;
              const result = await github.graphql(mutation, { packageId });
              core.info(`public: ${name} -> ${result.updatePackage.package.visibility}`);
              return result.updatePackage.package;
            }

            const candidates = [
              ...(await listRepoPackages()),
              ...(await listUserPackages()),
            ];
            core.info(
              `packages: ${candidates.map((pkg) => pkg.name).join(", ") || "(none)"}`
            );

            const match = candidates.find((pkg) =>
              [...targetNames].some(
                (name) => pkg.name === name || pkg.name.endsWith("/worker-ltx-comfyui")
              )
            );
            if (!match) {
              throw new Error("worker-ltx-comfyui package not found");
            }

            return await makePublic(match.id, match.name);

      - name: Verify anonymous ghcr pull
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -I "https://ghcr.io/v2/${{ github.repository_owner }}/worker-ltx-comfyui/manifests/v1")
          echo "anonymous manifest HTTP ${code}"
          test "${code}" = "200"
