name: wire-runpod-ghcr

on:
  workflow_dispatch:
  schedule:
    # GITHUB_TOKEN package scope lives ~1 hour. Refresh hourly so RunPod
    # can always pull ghcr.io/balkhaev/worker-ltx-comfyui:v1 on cold start
    # even when the underlying ghcr package stays private.
    - cron: "0 * * * *"

permissions:
  packages: read

env:
  RUNPOD_TEMPLATE_ID: esnxflkb5c
  RUNPOD_ENDPOINT_ID: hr1a398xx75thx
  WORKER_IMAGE: ghcr.io/balkhaev/worker-ltx-comfyui:v1

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - name: Wire RunPod ghcr registry auth + rolling release
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail
          AUTH_ID=$(curl -fsSL -X POST "https://rest.runpod.io/v1/containerregistryauth" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"ghcr-gha-${GITHUB_RUN_ID}\",\"username\":\"${{ github.actor }}\",\"password\":\"${GITHUB_TOKEN}\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          curl -fsSL -X POST "https://rest.runpod.io/v1/templates/${RUNPOD_TEMPLATE_ID}/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\":\"${WORKER_IMAGE}\",\"containerRegistryAuthId\":\"${AUTH_ID}\",\"env\":{\"BUCKET_ACCESS_KEY_ID\":\"C4BECUQ0RQ257E4Y6WUF\",\"BUCKET_ENDPOINT_URL\":\"https://hel1.your-objectstorage.com\",\"BUCKET_NAME\":\"generator\",\"BUCKET_SECRET_ACCESS_KEY\":\"8OSguPKCYjkYPc9OdDew2WIhH9UBmkP0IJFJ53Nl\",\"CIVITAI_API_KEY\":\"9c8719b645932b56ea8f32ff9a9e9714\",\"NETWORK_VOLUME_DEBUG\":\"true\",\"REFRESH_WORKER\":\"true\"}}"

          curl -fsSL -X POST "https://rest.runpod.io/v1/endpoints/${RUNPOD_ENDPOINT_ID}/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"templateId\":\"${RUNPOD_TEMPLATE_ID}\",\"flashboot\":false,\"workersMin\":0,\"workersMax\":1}"

          echo "RunPod template wired with registry auth ${AUTH_ID} and endpoint rolling release triggered"
