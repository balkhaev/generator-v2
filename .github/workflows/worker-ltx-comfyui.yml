name: worker-ltx-comfyui

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - packages/runpod/docker/worker-ltx-comfyui/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: packages/runpod/docker/worker-ltx-comfyui
          file: packages/runpod/docker/worker-ltx-comfyui/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/balkhaev/worker-ltx-comfyui:v1
            ghcr.io/balkhaev/worker-ltx-comfyui:latest

      - name: Publish ghcr package
        run: |
          for pkg in worker-ltx-comfyui generator-v2/worker-ltx-comfyui; do
            encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${pkg}', safe=''))")
            if curl -fsSL -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${encoded}/visibility" \
              -d '{"visibility":"public"}'; then
              echo "public: ${pkg}"
              exit 0
            fi
          done
          echo "warning: could not mark ghcr package public; RunPod needs containerRegistryAuthId" >&2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
