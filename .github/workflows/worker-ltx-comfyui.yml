name: worker-ltx-comfyui

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - packages/runpod/docker/worker-ltx-comfyui/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: packages/runpod/docker/worker-ltx-comfyui
          file: packages/runpod/docker/worker-ltx-comfyui/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/balkhaev/worker-ltx-comfyui:v1
            ghcr.io/balkhaev/worker-ltx-comfyui:latest

      - name: Make ghcr package public (REST)
        env:
          # GHCR_PAT must have admin:packages scope to flip visibility.
          # If absent we fall back to GITHUB_TOKEN, which usually has only
          # write:packages — visibility flip will return 403 and we log it.
          GH_PACKAGES_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          PKG="worker-ltx-comfyui"
          echo "Flipping ${OWNER}/${PKG} visibility -> public"
          RESP=$(curl -sS -o /tmp/vis.json -w "%{http_code}" \
            -X PATCH "https://api.github.com/users/${OWNER}/packages/container/${PKG}/visibility" \
            -H "Authorization: Bearer ${GH_PACKAGES_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"visibility":"public"}')
          echo "status=$RESP body=$(cat /tmp/vis.json | head -c 400)"
          # 204 = ok, 403 = token lacks admin:packages, 404 = wrong path
          if [ "$RESP" = "204" ]; then echo "public ok"; else
            echo "::warning::visibility flip failed (status=$RESP); set secrets.GHCR_PAT with admin:packages"
          fi

      - name: Wire RunPod ghcr registry auth
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          AUTH_ID=$(curl -fsSL -X POST "https://rest.runpod.io/v1/containerregistryauth" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"ghcr-gha-${GITHUB_RUN_ID}\",\"username\":\"${{ github.actor }}\",\"password\":\"${GITHUB_TOKEN}\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          # Touch image + auth only; env/runtime knobs belong to wire-runpod-ghcr.yml
          curl -fsSL -X POST "https://rest.runpod.io/v1/templates/esnxflkb5c/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\":\"ghcr.io/balkhaev/worker-ltx-comfyui:v1\",\"containerRegistryAuthId\":\"${AUTH_ID}\"}"
          curl -fsSL -X POST "https://rest.runpod.io/v1/endpoints/hr1a398xx75thx/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"templateId\":\"esnxflkb5c\",\"flashboot\":true,\"workersMin\":0,\"workersMax\":2}"
          echo "RunPod template wired with registry auth ${AUTH_ID}"
