name: worker-ltx-comfyui

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - packages/runpod/docker/worker-ltx-comfyui/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: packages/runpod/docker/worker-ltx-comfyui
          file: packages/runpod/docker/worker-ltx-comfyui/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/balkhaev/worker-ltx-comfyui:v1
            ghcr.io/balkhaev/worker-ltx-comfyui:latest

      - name: Publish ghcr package
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetNames = new Set([
              "worker-ltx-comfyui",
              `${repo}/worker-ltx-comfyui`,
            ]);

            async function listRepoPackages() {
              const query = `
                query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    packages(first: 50, packageType: CONTAINER) {
                      nodes { id name }
                    }
                  }
                }`;
              const data = await github.graphql(query, { owner, repo });
              return data.repository.packages.nodes;
            }

            async function listUserPackages() {
              const query = `
                query {
                  viewer {
                    packages(first: 50, packageType: CONTAINER) {
                      nodes { id name }
                    }
                  }
                }`;
              const data = await github.graphql(query);
              return data.viewer.packages.nodes;
            }

            const candidates = [
              ...(await listRepoPackages()),
              ...(await listUserPackages()),
            ];
            const match = candidates.find((pkg) =>
              [...targetNames].some(
                (name) => pkg.name === name || pkg.name.endsWith("/worker-ltx-comfyui")
              )
            );
            if (!match) {
              core.warning("worker-ltx-comfyui package not found; skipping visibility update");
              return;
            }

            const mutation = `
              mutation($packageId: ID!) {
                updatePackage(input: { packageId: $packageId, visibility: PUBLIC }) {
                  package { id name visibility }
                }
              }`;
            const result = await github.graphql(mutation, { packageId: match.id });
            core.info(
              `public: ${result.updatePackage.package.name} -> ${result.updatePackage.package.visibility}`
            );

      - name: Wire RunPod ghcr registry auth
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          AUTH_ID=$(curl -fsSL -X POST "https://rest.runpod.io/v1/containerregistryauth" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"ghcr-gha-${GITHUB_RUN_ID}\",\"username\":\"${{ github.actor }}\",\"password\":\"${GITHUB_TOKEN}\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          curl -fsSL -X POST "https://rest.runpod.io/v1/templates/esnxflkb5c/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\":\"ghcr.io/balkhaev/worker-ltx-comfyui:v1\",\"containerRegistryAuthId\":\"${AUTH_ID}\",\"env\":{\"REFRESH_WORKER\":\"true\"}}"
          curl -fsSL -X POST "https://rest.runpod.io/v1/endpoints/hr1a398xx75thx/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"templateId\":\"esnxflkb5c\",\"flashboot\":false,\"workersMin\":0,\"workersMax\":1}"
          echo "RunPod template wired with registry auth ${AUTH_ID}"
