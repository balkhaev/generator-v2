name: worker-ltx-comfyui

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - packages/runpod/docker/worker-ltx-comfyui/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: packages/runpod/docker/worker-ltx-comfyui
          file: packages/runpod/docker/worker-ltx-comfyui/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/balkhaev/worker-ltx-comfyui:v1
            ghcr.io/balkhaev/worker-ltx-comfyui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
