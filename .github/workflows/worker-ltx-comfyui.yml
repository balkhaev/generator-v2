name: worker-ltx-comfyui

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - packages/runpod/docker/worker-ltx-comfyui/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: packages/runpod/docker/worker-ltx-comfyui
          file: packages/runpod/docker/worker-ltx-comfyui/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          # Push to the public mirror namespace (worker-ltx-comfyui-public is the
          # only package the owner flipped to public). Keep legacy tags too for
          # back-compat with anything still pinned to the old path.
          tags: |
            ghcr.io/balkhaev/worker-ltx-comfyui-public:v1
            ghcr.io/balkhaev/worker-ltx-comfyui-public:latest
            ghcr.io/balkhaev/worker-ltx-comfyui:v1
            ghcr.io/balkhaev/worker-ltx-comfyui:latest

      - name: Ensure ghcr packages are public
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          for PKG in worker-ltx-comfyui-public worker-ltx-comfyui; do
            echo "Flipping ${OWNER}/${PKG} visibility -> public"
            RESP=$(curl -sS -o /tmp/vis.json -w "%{http_code}" \
              -X PATCH "https://api.github.com/users/${OWNER}/packages/container/${PKG}/visibility" \
              -H "Authorization: Bearer ${GH_PACKAGES_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d '{"visibility":"public"}')
            echo "  ${PKG}: status=$RESP body=$(cat /tmp/vis.json | head -c 200)"
            if [ "$RESP" = "204" ]; then echo "  ${PKG}: public ok"; else
              echo "::warning::${PKG} visibility flip failed (status=$RESP)"
            fi
          done

      - name: Point RunPod template at public image (no auth needed)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          # Public ghcr image — no containerRegistryAuthId required.
          curl -fsSL -X POST "https://rest.runpod.io/v1/templates/esnxflkb5c/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"imageName":"ghcr.io/balkhaev/worker-ltx-comfyui-public:v1","containerRegistryAuthId":""}'
          curl -fsSL -X POST "https://rest.runpod.io/v1/endpoints/hr1a398xx75thx/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"templateId":"esnxflkb5c","flashboot":true,"workersMin":0,"workersMax":2}'
          echo "RunPod template pointing at public mirror"
