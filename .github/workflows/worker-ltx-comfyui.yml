name: worker-ltx-comfyui

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - packages/runpod/docker/worker-ltx-comfyui/**

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: packages/runpod/docker/worker-ltx-comfyui
          file: packages/runpod/docker/worker-ltx-comfyui/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/balkhaev/worker-ltx-comfyui:v1
            ghcr.io/balkhaev/worker-ltx-comfyui:latest

      - name: Ensure ghcr package stays public
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          PKG="worker-ltx-comfyui"
          RESP=$(curl -sS -o /tmp/vis.json -w "%{http_code}" \
            -X PATCH "https://api.github.com/users/${OWNER}/packages/container/${PKG}/visibility" \
            -H "Authorization: Bearer ${GH_PACKAGES_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"visibility":"public"}')
          echo "${PKG}: status=$RESP body=$(cat /tmp/vis.json | head -c 200)"
          # 204 = ok, 422 = already public; both fine. 403 needs GHCR_PAT with admin:packages.
          if [ "$RESP" = "204" ] || [ "$RESP" = "422" ]; then
            echo "${PKG} visibility ok"
          else
            echo "::warning::${PKG} visibility flip returned $RESP; if private — set secrets.GHCR_PAT (admin:packages)"
          fi

      - name: Point RunPod template at public image (no auth needed)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          # Public ghcr image — no containerRegistryAuthId required.
          curl -fsSL -X POST "https://rest.runpod.io/v1/templates/esnxflkb5c/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"imageName":"ghcr.io/balkhaev/worker-ltx-comfyui:v1","containerRegistryAuthId":""}'
          curl -fsSL -X POST "https://rest.runpod.io/v1/endpoints/hr1a398xx75thx/update" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"templateId":"esnxflkb5c","flashboot":true,"workersMin":1,"workersMax":2,"idleTimeout":300,"scalerType":"QUEUE_DELAY","scalerValue":4}'
          echo "RunPod template wired with public image (always-warm: min=1, idle=300s)"
