[cerebrium.deployment]
name = "flux-inference"
python_version = "3.11"
docker_base_image_url = "nvidia/cuda:12.4.0-runtime-ubuntu22.04"

[cerebrium.hardware]
compute = "ADA_L40"
cpu = 8
memory = 48.0
gpu_count = 1

[cerebrium.environment]
TMPDIR = "/persistent-storage/tmp"
HF_HOME = "/persistent-storage/.cache/huggingface"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 3
cooldown = 120

[cerebrium.dependencies.pip]
torch = ">=2.4.0"
diffusers = ">=0.37.0"
huggingface-hub = ">=0.25.0"
transformers = ">=4.44.0"
accelerate = ">=1.0.0"
safetensors = ">=0.4.0"
sentencepiece = ">=0.2.0"
peft = ">=0.13.0"
Pillow = ">=10.0.0"
