[cerebrium.deployment]
name = "lora-training"
python_version = "3.11"
docker_base_image_url = "nvidia/cuda:12.4.0-runtime-ubuntu22.04"
deployment_initialization_timeout = 830

[cerebrium.hardware]
compute = "ADA_L40"
cpu = 8
memory = 48.0
gpu_count = 1

[cerebrium.environment]
TMPDIR = "/persistent-storage/tmp"
HF_HOME = "/persistent-storage/.cache/huggingface"

[cerebrium.scaling]
min_replicas = 0
max_replicas = 1
cooldown = 3600

[cerebrium.runtime]
response_grace_period = 7200

[cerebrium.dependencies.apt]
git = "latest"

[cerebrium.dependencies.pip]
torch = ">=2.4.0"
diffusers = ">=0.37.0"
transformers = ">=4.44.0"
accelerate = ">=1.0.0"
safetensors = ">=0.4.0"
sentencepiece = ">=0.2.0"
peft = ">=0.13.0"
Pillow = ">=10.0.0"
torchvision = ">=0.19.0"
bitsandbytes = ">=0.44.0"
