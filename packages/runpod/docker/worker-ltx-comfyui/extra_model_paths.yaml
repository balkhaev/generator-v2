# ComfyUI extra_model_paths — мапит модели на network volume
# (`/runpod-volume`) в стандартные ключи ComfyUI loaders'ов.
#
# Структура volume унаследована от pod-mode (`volumeMountPath: /workspace`
# в `seed-sulphur-volumes.ts`). В pod'е seeder делает `mkdir
# /workspace/ComfyUI/models/...`, что физически создаёт на volume
# `/ComfyUI/models/...` (от корня volume). В serverless этот же volume
# монтируется в `/runpod-volume`, поэтому полный путь становится
# `/runpod-volume/ComfyUI/models/...` — БЕЗ префикса `workspace/`.
#
# Если volume пустой / без `ComfyUI/models` — ComfyUI просто не найдёт
# модели, и worker сразу ответит `validation` ошибкой при первом /prompt
# (см. NETWORK_VOLUME_DEBUG=true для подсказок в логах).
#
# RunPod volumes for LTX 2.3 заполняются через
# `packages/runpod/scripts/warmup-volumes.ts` (LTX base) и
# `packages/runpod/scripts/seed-sulphur-volumes.ts` (Sulphur base).
#
# IMPORTANT: НЕ маппим `custom_nodes` с volume. На исторических volumes
# (унаследованных от pod-mode `ls250824/run-comfyui-ltx`) лежат старые
# custom_nodes (lora-manager, frame-interpolation, rgthree и проч.),
# которые крашат ComfyUI на старте (несовместимые зависимости с
# worker-comfyui:5.8.5-base). Custom nodes ставим только из image
# (`comfy-node-install` в Dockerfile).
ltx_volume:
  base_path: /runpod-volume/ComfyUI

  checkpoints: models/checkpoints/
  clip: models/clip/
  clip_vision: models/clip_vision/
  configs: models/configs/
  controlnet: models/controlnet/
  diffusers: models/diffusers/
  diffusion_models: models/diffusion_models/
  embeddings: models/embeddings/
  hypernetworks: models/hypernetworks/
  # `latent_upscale_models` — нестандартный ключ comfyui-ltxvideo для
  # LatentUpscaleModelLoader (spatial upscaler x2/x1.5). Файлы лежат в
  # `models/latent_upscale_models/`.
  latent_upscale_models: models/latent_upscale_models/
  loras: models/loras/
  style_models: models/style_models/
  text_encoders: models/text_encoders/
  unet: models/unet/
  upscale_models: models/upscale_models/
  vae: models/vae/
  vae_approx: models/vae_approx/

# Дополнительный fallback на случай если volume организован "плоско"
# (модели прямо в /runpod-volume/models/...). Это нативный layout
# worker-comfyui — используется если кто-то заливал модели через
# RunPod S3 API или fresh volumes без pod-mode prehistory.
ltx_volume_flat:
  base_path: /runpod-volume

  checkpoints: models/checkpoints/
  clip: models/clip/
  clip_vision: models/clip_vision/
  configs: models/configs/
  controlnet: models/controlnet/
  diffusers: models/diffusers/
  diffusion_models: models/diffusion_models/
  embeddings: models/embeddings/
  hypernetworks: models/hypernetworks/
  latent_upscale_models: models/latent_upscale_models/
  loras: models/loras/
  style_models: models/style_models/
  text_encoders: models/text_encoders/
  unet: models/unet/
  upscale_models: models/upscale_models/
  vae: models/vae/
  vae_approx: models/vae_approx/
